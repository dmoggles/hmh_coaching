name: Build and deploy player assessment frontend

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: player_assessment/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: player_assessment/frontend

      - name: Build
        run: npm run build
        working-directory: player_assessment/frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Commit built files to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          rm -rf player_assessment/dist
          cp -r player_assessment/frontend/dist player_assessment/dist
          git add player_assessment/dist
          git diff --cached --quiet || git commit -m "chore: rebuild player assessment frontend [skip ci]"
          git push origin main
