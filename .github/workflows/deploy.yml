name: Build and deploy player assessment frontend to VPS

on:
  push:
    branches: [main]
    paths:
      - 'player_assessment/frontend/src/**'
      - 'player_assessment/frontend/index.html'
      - 'player_assessment/frontend/vite.config.js'
      - 'player_assessment/frontend/package*.json'
      - 'player_assessment/frontend/.env*'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: player_assessment/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: player_assessment/frontend

      - name: Build
        run: npm run build
        working-directory: player_assessment/frontend

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "player_assessment/frontend/dist/*"
          target: "/var/www/player_assessment"
          strip_components: 3
          overwrite: true
